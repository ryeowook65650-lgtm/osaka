<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大阪旅遊</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f4f2e2">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. 和洋折衷色彩變數與基礎 (Variables & Base)
           ========================================= */
        :root {
            /* 用戶指定主色調 */
            --color-red: #b01013;    /* 傳統深紅 (鳥居/漆器感) */
            --color-blue: #a2b9d5;   /* 柔和霧藍 */
            --color-cream: #f4f2e2;  /* 米白紙張底色 */
            --color-green: #aaccb1;  /* 柔和草綠 */
            
            /* 衍生 UI 用色 */
            --color-dark: #2a221e;   /* 極深棕/墨色，取代純黑，質感更好 */
            --color-text-muted: #85756a;
            --color-white: #ffffff;
            
            --font-serif: "Noto Serif TC", "Georgia", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            
            /* 質感陰影與圓角 */
            --border-radius-card: 16px;
            --border-radius-pill: 50px;
            --box-shadow-soft: 0 12px 35px rgba(42, 34, 30, 0.06);
            --box-shadow-btn: 0 8px 20px rgba(176, 16, 19, 0.25);
            --transition-speed: 0.3s;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        button, input, select, textarea {
            appearance: none; -webkit-appearance: none;
            font-family: inherit; margin: 0; padding: 0; outline: none; background: transparent; border: none;
        }
        
        /* 提升觸控靈敏度，消除 300ms 延遲 */
        button, .chip, .nav-btn, .cat-btn, .date-divider, .weather-badge {
            touch-action: manipulation;
        }
        
        body { 
            margin: 0; padding: 0; font-family: var(--font-sans); background-color: var(--color-cream); color: var(--color-dark); letter-spacing: 0.03em; 
            /* 適配 iOS 底部橫條 */
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            /* 輕微的紙張紋理感 (Noise) */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            /* 阻斷瀏覽器原生的下拉刷新與邊緣彈性效果 */
            overscroll-behavior-y: none; 
            /* 禁用長按選取文字 (提升 App 手感) */
            -webkit-user-select: none;
            user-select: none;
        }

        /* 讓輸入框恢復可以選取文字與游標操作 */
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* =========================================
           2. 頂部導覽列 (Header & Navigation)
           ========================================= */
        .top-bar { 
            position: sticky; top: 0; z-index: 999; background-color: rgba(244, 242, 226, 0.9); backdrop-filter: blur(12px); padding-top: env(safe-area-inset-top); 
            border-bottom: 1px solid rgba(42, 34, 30, 0.05);
        }
        .header-info { padding: 20px 24px 15px; display: flex; justify-content: space-between; align-items: center; }
        .app-title { font-family: var(--font-serif); font-size: 26px; font-weight: 900; color: var(--color-red); display: flex; align-items: center; gap: 8px;}
        .refresh-btn { font-size: 22px; cursor: pointer; color: var(--color-dark); opacity: 0.5; transition: var(--transition-speed); }
        .refresh-btn:active { transform: rotate(180deg); opacity: 1; }
        
        .weather-badge { font-size: 13px; font-weight: 600; color: var(--color-dark); background: var(--color-white); padding: 8px 16px; border-radius: var(--border-radius-pill); cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(42, 34, 30, 0.05); border: 1px solid rgba(42,34,30,0.05); transition: var(--transition-speed);}
        .weather-badge:active { transform: scale(0.95); }

        /* 浮島式導航列 */
        .nav-bar-row { display: flex; align-items: center; padding: 5px 24px 20px; gap: 8px; }
        .nav-wrapper { display: flex; background: var(--color-white); border-radius: var(--border-radius-pill); padding: 4px; width: 100%; box-shadow: 0 4px 20px rgba(42, 34, 30, 0.04); border: 1px solid rgba(42,34,30,0.05); }
        .nav-btn, .nav-select-wrapper { flex: 1; }
        .nav-btn, .nav-select { display: block; width: 100%; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 700; color: var(--color-text-muted); cursor: pointer; transition: var(--transition-speed); border-radius: var(--border-radius-pill); }
        .nav-select-wrapper { position: relative; }
        .nav-select-wrapper::after { content: '▾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--color-text-muted); pointer-events: none; transition: var(--transition-speed); }
        .nav-select { text-align-last: center; padding: 12px; }
        
        .nav-btn.active, .nav-select-wrapper.active .nav-select { background-color: var(--color-red); color: var(--color-white); box-shadow: 0 4px 12px rgba(176, 16, 19, 0.2); }
        .nav-select-wrapper.active::after { color: var(--color-white); }

        /* =========================================
           3. 視圖容器與共用卡片
           ========================================= */
        .view-container { display: none; padding: 20px 24px; max-width: 600px; margin: 0 auto; }
        .view-container.active { display: block; animation: fadeUpIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUpIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .retro-card, .flight-ticket, .balance-card, .input-area, .trip-card { background-color: var(--color-white); border-radius: var(--border-radius-card); box-shadow: var(--box-shadow-soft); margin-bottom: 24px; border: 1px solid rgba(42, 34, 30, 0.03); }

        /* =========================================
           4. 記帳版面 (Accounting)
           ========================================= */
        .balance-card { padding: 35px 30px; position: relative; background: linear-gradient(145deg, #ffffff, #fcfcfc); overflow: hidden; }
        /* 卡片裝飾背景圖形 */
        .balance-card::before { content: ''; position: absolute; top: -50px; right: -30px; width: 150px; height: 150px; background: var(--color-red); opacity: 0.03; border-radius: 50%; }
        
        .balance-label { font-size: 13px; font-weight: 700; color: var(--color-text-muted); letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-serif);}
        .balance-amount { font-family: var(--font-serif); font-variant-numeric: tabular-nums; font-size: 48px; margin: 10px 0 4px; font-weight: 900; color: var(--color-dark); letter-spacing: -1px; line-height: 1.1; }
        .balance-sub { font-size: 16px; font-weight: 600; color: var(--color-blue); }
        .rate-tag { position: absolute; top: 30px; right: 30px; font-size: 12px; background-color: var(--color-cream); color: var(--color-dark); padding: 6px 12px; font-weight: 700; border-radius: var(--border-radius-pill); border: 1px solid rgba(42,34,30,0.08);}

        /* 預算進度條 */
        .budget-container { margin-top: 35px; padding-top: 25px; border-top: 1px dashed rgba(42, 34, 30, 0.1); display: flex; flex-direction: column; gap: 12px; }
        .budget-rem-row { text-align: left; font-size: 22px; font-weight: 700; color: var(--color-dark); font-family: var(--font-serif); transition: color 0.3s; }
        .budget-track { height: 10px; width: 100%; background: var(--color-cream); border-radius: 10px; overflow: hidden; }
        .budget-fill { 
            height: 100%; width: 0%; border-radius: 10px;
            background-color: var(--color-green); transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
            background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 8px, transparent 8px, transparent 16px);
        }
        .budget-tot-row { text-align: right; font-size: 12px; font-weight: 600; color: var(--color-text-muted); }

        /* 網格統計 */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 24px; width: 100%; box-sizing: border-box; }
        .stat-box { background: var(--color-white); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(42,34,30,0.04); border: 1px solid rgba(42,34,30,0.04);}
        .stat-box:active { transform: scale(0.96); }
        .stat-box.active-filter { background: var(--color-dark); box-shadow: 0 8px 20px rgba(42,34,30,0.2); }
        .stat-box-title { font-size: 13px; font-weight: 700; color: var(--color-text-muted); display: flex; align-items: center; gap: 6px; }
        .stat-box.active-filter .stat-box-title { color: var(--color-cream); opacity: 0.8;}
        .stat-box-val { font-size: 20px; font-weight: 900; color: var(--color-dark); font-family: var(--font-serif); font-variant-numeric: tabular-nums; }
        .stat-box.active-filter .stat-box-val { color: var(--color-white); }

        /* 表單輸入區 */
        .input-area { padding: 30px 24px; background: transparent; box-shadow: none; border: none;}
        .input-title { font-size: 15px; font-weight: 700; color: var(--color-dark); margin-bottom: 14px; display: block; font-family: var(--font-serif);}
        
        .scroll-container, .cat-row { 
            overflow-x: auto; white-space: nowrap; padding-bottom: 10px; scrollbar-width: none; display: flex; gap: 12px; 
            padding-right: 40px; mask-image: linear-gradient(to right, black 85%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%); margin-bottom: 25px;
            /* 加入橫向滑動捕捉 */
            scroll-snap-type: x mandatory;
            scroll-padding-left: 0;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .chip { display: flex; align-items: center; justify-content: center; background: var(--color-white); border: 1px solid rgba(42,34,30,0.08); border-radius: var(--border-radius-pill); padding: 10px 20px; font-size: 14px; font-weight: 700; color: var(--color-text-muted); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(42,34,30,0.02);
            /* 滑動捕捉定位 */
            scroll-snap-align: start;
        }
        .chip.active { background: var(--color-red); color: var(--color-white); border-color: var(--color-red); box-shadow: var(--box-shadow-btn);}

        .cat-btn { flex: 1; min-width: 85px; padding: 16px 10px; background: var(--color-white); border-radius: 16px; border: 1px solid rgba(42,34,30,0.05); font-size: 13px; font-weight: 700; color: var(--color-text-muted); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(42,34,30,0.02);
            /* 滑動捕捉定位 */
            scroll-snap-align: start;
        }
        .cat-btn.active { background: var(--color-blue); color: var(--color-white); border-color: var(--color-blue); box-shadow: 0 8px 20px rgba(162,185,213,0.4); transform: translateY(-4px);}
        .cat-emoji { font-size: 28px; display: block; margin-bottom: 10px; transition: 0.2s; }
        .cat-btn.active .cat-emoji { transform: scale(1.1); color: var(--color-white);}

        /* 質感輸入框 */
        .input-group { 
            display: flex; flex-direction: column; background: var(--color-white); border-radius: 16px; margin-bottom: 24px; transition: box-shadow 0.3s ease; width: 100%; overflow: hidden; box-shadow: 0 4px 15px rgba(42,34,30,0.03); border: 1px solid rgba(42,34,30,0.05);
        }
        .input-group:focus-within { box-shadow: 0 8px 25px rgba(42,34,30,0.08); border-color: var(--color-blue);}
        .curr-btn-row { display: flex; width: 100%; border-top: 1px solid rgba(42,34,30,0.05); border-bottom: 1px solid rgba(42,34,30,0.05); background: #faf9f5; }
        .curr-btn { flex: 1; padding: 16px 0; font-size: 14px; font-weight: 700; color: var(--color-text-muted); cursor: pointer; transition: 0.2s; border-right: 1px solid rgba(42,34,30,0.05); }
        .curr-btn:last-child { border-right: none; }
        .curr-btn.active { background: var(--color-blue); color: var(--color-white); }
        
        .modern-input { 
            display: block; width: 100%; padding: 20px; font-size: 17px; color: var(--color-dark); font-weight: 700; transition: 0.2s; border-left: 4px solid transparent; font-family: var(--font-sans);
        }
        .modern-input:focus { border-left: 4px solid var(--color-red); padding-left: 24px; background: rgba(176,16,19,0.02);}
        .modern-input::placeholder { color: #c4bbb4; font-weight: 500; }

        .add-btn { 
            width: 100%; background: var(--color-red); color: var(--color-white); padding: 20px; border-radius: var(--border-radius-pill); font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; letter-spacing: 2px; box-shadow: var(--box-shadow-btn); display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; 
            position: sticky; 
            /* 適配 iOS 底部橫條 */
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            z-index: 100;
        }
        .add-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(176,16,19,0.2); }
        .add-btn:disabled { background: var(--color-text-muted); box-shadow: none; transform: none; }

        /* 歷史清單 */
        .date-section { margin-bottom: 30px; }
        .date-divider { font-family: var(--font-serif); font-size: 22px; color: var(--color-dark); font-weight: 900; padding: 10px 0; border-bottom: 2px solid rgba(42,34,30,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .date-divider::after { content: '▾'; font-family: var(--font-sans); font-size: 18px; color: var(--color-text-muted); transition: 0.3s; }
        .date-section.collapsed .date-divider::after { transform: rotate(-90deg); }
        .date-section.collapsed .history-items-wrapper { display: none; }
        
        .history-item { display: flex; justify-content: space-between; align-items: center; background: var(--color-white); padding: 20px; margin-bottom: 12px; border-radius: 16px; box-shadow: 0 4px 15px rgba(42,34,30,0.03); transition: 0.2s; border: 1px solid rgba(42,34,30,0.02);}
        .history-item:active { transform: scale(0.98); background: #faf9f5; }
        .h-name { font-weight: 700; font-size: 16px; color: var(--color-dark); display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .h-tag { font-size: 11px; background: var(--color-cream); color: var(--color-dark); padding: 4px 10px; border-radius: 20px; font-weight: 700; }
        .h-cat { font-size: 13px; color: var(--color-text-muted); font-weight: 600; margin-top: 8px;}
        .h-price { font-weight: 900; font-size: 18px; color: var(--color-red); font-family: var(--font-serif); font-variant-numeric: tabular-nums; text-align: right; }
        .h-twd { font-size: 12px; color: var(--color-text-muted); display: block; font-weight: 600; margin-top: 6px; text-align: right; }
        .del-btn { color: #c4bbb4; font-size: 22px; padding: 10px; margin-left: 10px; transition: 0.2s; border-radius: 50%;}
        .del-btn:active { color: var(--color-red); background: rgba(176,16,19,0.05); }
        
        .empty-state { text-align: center; padding: 50px 20px; color: var(--color-text-muted); border: 2px dashed rgba(42,34,30,0.15); background: rgba(255,255,255,0.5); border-radius: 20px; margin: 20px 0; }
        .empty-state-icon { font-size: 52px; margin-bottom: 15px; opacity: 0.5; color: var(--color-blue);}
        .empty-state-text { font-size: 15px; font-weight: 700; }

        /* =========================================
           5. 機票與行程設計 (Flight & Itinerary)
           ========================================= */
        .flight-ticket { background: var(--color-white); border-radius: 20px; box-shadow: var(--box-shadow-soft); margin-bottom: 25px; overflow: hidden; position: relative;}
        /* 打孔效果 */
        .flight-ticket::before, .flight-ticket::after { content: ''; position: absolute; top: 60px; width: 24px; height: 24px; background-color: var(--color-cream); border-radius: 50%; z-index: 2; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);}
        .flight-ticket::before { left: -12px; }
        .flight-ticket::after { right: -12px; }
        
        .ticket-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed rgba(42,34,30,0.1); }
        .ticket-header.outbound { background: rgba(162,185,213,0.15); } /* 藍色系 */
        .ticket-header.inbound { background: rgba(170,204,177,0.15); }  /* 綠色系 */
        .ticket-label { font-family: var(--font-serif); font-size: 16px; font-weight: 900; color: var(--color-dark); letter-spacing: 1px;}
        .ticket-date { font-weight: 700; font-size: 14px; color: var(--color-text-muted);}
        .ticket-body { padding: 35px 25px 25px; }
        .route-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .airport-code { font-size: 40px; font-weight: 900; color: var(--color-dark); font-family: var(--font-serif); }
        .airport-name { font-size: 14px; font-weight: 700; display: block; margin-top: 8px; color: var(--color-text-muted); }
        .flight-icon { font-size: 32px; color: var(--color-blue); opacity: 0.8; }
        .time-row { display: flex; justify-content: space-between; background: #faf9f5; padding: 20px; border-radius: 16px; margin-bottom: 20px;}
        .time-val { font-size: 22px; font-weight: 900; color: var(--color-red); font-family: var(--font-sans); }
        .time-lbl { font-size: 11px; font-weight: 700; margin-bottom: 8px; display: block; color: var(--color-text-muted); letter-spacing: 1px;}
        .flight-info-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--color-dark); padding: 0 5px;}

        /* 行程時間軸 */
        .day-schedule { display: none; }
        .day-schedule.active { display: block; animation: fadeUpIn 0.5s ease forwards; }
        .day-header { font-family: var(--font-serif); font-size: 28px; color: var(--color-dark); margin-bottom: 35px; font-weight: 900; display: inline-block; position: relative; z-index: 10; padding: 0 10px;}
        .day-header::after { content: ''; position: absolute; left: 0; bottom: 6px; width: 100%; height: 12px; background: rgba(162,185,213,0.4); z-index: -1; border-radius: 4px;} 
        
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 6px; top: 20px; bottom: 20px; width: 2px; background: rgba(42,34,30,0.1); border-radius: 2px;}
        .trip-card { position: relative; border-radius: 20px; overflow: hidden; background: var(--color-white); box-shadow: 0 8px 25px rgba(42,34,30,0.05); margin-bottom: 35px; border: 1px solid rgba(42,34,30,0.03);}
        .trip-card::after { content: ''; position: absolute; left: -22px; top: 40px; width: 14px; height: 14px; background: var(--color-cream); border: 3px solid var(--color-red); z-index: 1; border-radius: 50%; box-shadow: 0 0 0 4px var(--color-cream);}
        
        .card-img-top { width: 100%; aspect-ratio: 16/9; background-color: #e8e4db; object-fit: cover; display: block; }
        .card-content { padding: 25px; }
        .t-time { font-size: 13px; font-weight: 700; color: var(--color-dark); background: var(--color-cream); padding: 6px 12px; display: inline-block; margin-bottom: 16px; border-radius: var(--border-radius-pill); }
        .t-title { font-family: var(--font-serif); font-size: 22px; font-weight: 900; margin-bottom: 24px; line-height: 1.4; color: var(--color-red); }
        .info-block { display: flex; gap: 14px; margin-bottom: 18px; font-size: 15px; align-items: flex-start; }
        .i-icon { color: var(--color-text-muted); font-size: 22px; line-height: 1.2; }
        .i-text { flex: 1; line-height: 1.6; font-weight: 600; color: var(--color-dark); }
        .cost-tag { display: inline-block; color: var(--color-blue); font-size: 13px; font-weight: 700; margin-top: 4px; }
        
        .map-link { display: flex; align-items: center; justify-content: center; background: #faf9f5; color: var(--color-dark); text-decoration: none; padding: 18px; margin-top: 25px; font-size: 15px; font-weight: 700; gap: 8px; transition: var(--transition-speed); border-radius: 16px; border: 1px solid rgba(42,34,30,0.05);}
        .map-link:active { background: var(--color-cream); transform: scale(0.98); }
        .copy-btn { background: var(--color-white); border: 1px solid rgba(42,34,30,0.1); cursor: pointer; font-size: 13px; margin-left: 8px; color: var(--color-dark); padding: 4px 10px; border-radius: var(--border-radius-pill); display: inline-flex; align-items: center; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .copy-btn:active { background: var(--color-cream); }

        /* =========================================
           6. Toast & Loading 系統
           ========================================= */
        .toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 9999; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(42,34,30,0.95); backdrop-filter: blur(10px); color: var(--color-white); padding: 18px 24px; font-size: 15px; font-weight: 700; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast.hide { animation: toastOut 0.3s ease-in forwards; }
        .toast.success i { color: var(--color-green); font-size: 22px;}
        .toast.error i { color: var(--color-red); font-size: 22px;}
        .toast.warning i { color: var(--color-warning); font-size: 22px;}
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(10px) scale(0.95); } }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 242, 226, 0.8); backdrop-filter: blur(5px); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }

        @keyframes spin { to { transform: rotate(360deg); } }

            document.querySelectorAll('#person-container .chip').forEach(c => c.classList.remove('active'));

        }

            Store.state.category = cat;
            document.querySelectorAll('.cat-btn').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

            Store.state.currency = curr;
            document.querySelectorAll('.curr-btn').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('item-price').placeholder = curr === 'JPY' ? "輸入金額 (¥)" : "輸入金額 ($)";

            Store.state.activeFilter = (Store.state.activeFilter === filter || filter === 'All') ? 'All' : filter;
            document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active-filter'));
            if (Store.state.activeFilter !== 'All') {
                const el = document.getElementById(`filter-${Store.state.activeFilter}`);
                if (el) el.classList.add('active-filter');
            }
            renderExpenses();
        }

            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = text;
            show ? overlay.classList.add('active') : overlay.classList.remove('active');
        }

        async function fetchExchangeRate() {
            try {
                // 改為抓取日圓匯率 (JPY vs TWD)
                const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                const data = await res.json();
                if (data?.rates?.TWD) {
                    Store.updateRate(data.rates.TWD);
                }
            } catch (e) { console.warn('匯率更新失敗，使用快取。'); }
            document.getElementById('rate-display').innerText = `匯率: ${Store.state.rate.toFixed(4)}`;
            renderExpenses();
        }

        async function fetchOsakaWeather() {
            const badge = document.getElementById('weather-badge');
            badge.disabled = true; badge.innerHTML = '🇯🇵 更新中...';
            try {
                // 改為大阪的經緯度
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.6937&longitude=135.5023&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await res.json();
                badge.innerHTML = `🇯🇵 大阪 ${Math.round(data.current_weather.temperature)}°C`;
            } catch (e) { 
                badge.innerHTML = '🇯🇵 天氣載入失敗'; 
            } finally {
                badge.disabled = false;
            }
        }

        async function fetchExpenses() {
            const listEl = document.getElementById('expense-list');
            
            if (Store.state.expenses.length > 0) {
                renderExpenses();
            } else {
                toggleLoading(true, '同步帳本資料...');
            }

            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const freshData = await res.json(); 
                Store.updateExpenses(freshData);
                renderExpenses();
            } catch (err) {
                if (Store.state.expenses.length === 0) {
                    listEl.innerHTML = `<div class="empty-state"><i class="ph ph-wifi-x empty-state-icon"></i><div class="empty-state-text">連線失敗，請檢查網路狀態</div></div>`;
                }
            } finally {
                toggleLoading(false);
            }
        }

        async function addExpense() {
            const itemNameEl = document.getElementById('item-name');
            const itemPriceEl = document.getElementById('item-price');

            const inputPrice = parseFloat(itemPriceEl.value); 
            
            if (isNaN(inputPrice) || inputPrice <= 0) {
                itemPriceEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => itemPriceEl.focus(), 300);
                return showToast('請先輸入有效的金額！', 'error'); 
            }
            
            let baseName = itemNameEl.value.trim() || Store.state.category;
            let personName = Store.state.person;
            let finalName = personName ? `【${personName}】${baseName}` : baseName;
            const finalPriceTWD = Store.state.currency === 'JPY' ? Math.round(inputPrice * Store.state.rate) : Math.round(inputPrice); 
            
            const newId = Date.now();
            const formData = newSearchParams({
                action: 'add', id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: finalPriceTWD
            });

            // 💡 樂觀更新 (Optimistic UI)
            const newExpenseObj = {
                id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: finalPriceTWD
            };
            Store.updateExpenses([...Store.state.expenses, newExpenseObj]);
            renderExpenses();
            
            itemNameEl.value = ''; itemPriceEl.value = ''; itemPriceEl.blur(); 
            showToast(`已新增一筆花費！`, 'success');

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                fetchExpenses(); 
            } catch (err) { 
                showToast('背景同步延遲，資料已暫存', 'warning'); 
            }
        }

        async function deleteExpense(id) {
            if (!confirm('確定刪除此筆紀錄？')) return;
            const formData = new URLSearchParams({ action: 'delete', id });
            
            const originalExpenses = [...Store.state.expenses]; 
            Store.updateExpenses(Store.state.expenses.filter(item => item.id != id));
            renderExpenses(); 

            try { 
                await fetch(SCRIPT_URL, { method: 'POST', body: formData }); 
                showToast('紀錄已刪除', 'success');
                fetchExpenses();
            } catch (err) { 
                showToast('刪除失敗，資料已還原', 'error');
                Store.updateExpenses(originalExpenses);
                renderExpenses(); 
            }
        }

        const escapeHTML = str => String(str).replace(/[&<>'"]/g, tag => ({ 
            '&': '&', '<': '<', '>': '>', "'": '&#39;', '"': '&quot;' 
        }[tag] || tag));

        function newSearchParams(obj) {
            const params = new URLSearchParams();
            for (const key in obj) { params.append(key, obj[key]); }
            return params;
        }

        function renderExpenses() {
            let grandTotalTWD = 0; 
            let statsTWD = { '交通': 0, '食物': 0, '購物': 0, '其他': 0 };
            const fragment = document.createDocumentFragment();
            let hasRenderedAny = false;

            TRIP_DATES.forEach((date, index) => {
                const dailyItems = Store.state.expenses.filter(item => {
                    const sheetDate = String(item.date).trim();
                    let isMatchDate = (sheetDate === date || sheetDate.includes(date) || (sheetDate.includes('T') && `${new Date(sheetDate).getMonth() + 1}/${new Date(sheetDate).getDate()}` === date));
                    let isMatchFilter = (Store.state.activeFilter === 'All' || item.cat === Store.state.activeFilter);
                    return isMatchDate && isMatchFilter;
                });

                if (dailyItems.length > 0) {
                    hasRenderedAny = true;
                    const section = document.createElement('div');
                    section.className = 'date-section';
                    if (Store.state.activeFilter === 'All' && index < TRIP_DATES.indexOf(Store.state.date) - 1 ) {
                        section.classList.add('collapsed'); 
                    }

                    const divider = document.createElement('div'); 
                    divider.className = 'date-divider'; divider.textContent = date; 
                    divider.onclick = () => section.classList.toggle('collapsed');
                    section.appendChild(divider);

                    const wrapper = document.createElement('div');
                    wrapper.className = 'history-items-wrapper';

                    dailyItems.forEach(item => {
                        const twdValue = Math.round(parseFloat(item.price));
                        if (Store.state.activeFilter === 'All') {
                            grandTotalTWD += twdValue;
                            statsTWD[item.cat] = (statsTWD[item.cat] || 0) + twdValue;
                        }

                        const jpyValue = (twdValue / Store.state.rate).toFixed(0);
                        let safeName = escapeHTML(item.name); 
                        const emoji = EMOJI_MAP[item.cat] || EMOJI_MAP['其他'];

                        let personTagHtml = '';
                        const tagMatch = safeName.match(/^【(.*?)】(.*)/);
                        if (tagMatch) {
                            personTagHtml = `<span class="h-tag">${tagMatch[1]}</span>`;
                            safeName = tagMatch[2].trim();
                        }

                        const div = document.createElement('div'); 
                        div.className = 'history-item';
                        div.innerHTML = `
                            <div>
                                <div class="h-name">${emoji} <span>${safeName}</span> ${personTagHtml}</div>
                                <div class="h-cat">${item.cat}</div>
                            </div>
                            <div style="display:flex; align-items:center;">
                                <div>
                                    <div class="h-price">NT$ ${twdValue.toLocaleString()}</div>
                                    <span class="h-twd">≈ ¥ ${jpyValue}</span>
                                </div>
                                <button class="del-btn" onclick="deleteExpense(${item.id})"><i class="ph ph-trash"></i></button>
                            </div>`;
                        wrapper.appendChild(div);
                    });
                    section.appendChild(wrapper);
                    fragment.appendChild(section);
                }
            });

            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';
            if (!hasRenderedAny) {
                let emptyMsg = Store.state.activeFilter === 'All' ? '目前沒有記帳資料' : `這天沒有 ${Store.state.activeFilter} 的花費`;
                listEl.innerHTML = `<div class="empty-state"><i class="ph ph-receipt empty-state-icon"></i><div class="empty-state-text">${emptyMsg}</div></div>`;
            } else {
                listEl.appendChild(fragment);
            }

            if (Store.state.activeFilter === 'All') updateStats(grandTotalTWD, statsTWD);
        }

        function updateStats(totalTWD, statsTWD) {
            const displayTotalJPY = (totalTWD / Store.state.rate).toFixed(0);
            let remaining = TOTAL_BUDGET - totalTWD;
            let spentPercent = Math.min(100, Math.max(0, (totalTWD / TOTAL_BUDGET) * 100));
            
            document.getElementById('total-primary').textContent = `NT$ ${totalTWD.toLocaleString()}`;
            document.getElementById('total-secondary').textContent = `≈ ¥ ${displayTotalJPY}`;
            
            const remRow = document.getElementById('budget-rem-row');
            const fill = document.getElementById('budget-fill');
            remRow.textContent = remaining < 0 ? `超支 NT$ ${Math.abs(remaining).toLocaleString()}` : `剩餘 NT$ ${remaining.toLocaleString()}`;
            remRow.style.color = remaining < 0 ? 'var(--color-danger)' : (spentPercent > 85 ? 'var(--color-red)' : 'var(--color-dark)');
            fill.style.backgroundColor = remaining < 0 ? 'var(--color-danger)' : (spentPercent > 85 ? 'var(--color-warning)' : 'var(--color-success)');
            fill.style.width = `${spentPercent}%`;

            document.getElementById('stat-transport').textContent = `NT$ ${(statsTWD['交通'] || 0).toLocaleString()}`;
            document.getElementById('stat-food').textContent = `NT$ ${(statsTWD['食物'] || 0).toLocaleString()}`;
            document.getElementById('stat-shopping').textContent = `NT$ ${(statsTWD['購物'] || 0).toLocaleString()}`;
            document.getElementById('stat-other').textContent = `NT$ ${(statsTWD['其他'] || 0).toLocaleString()}`;
        }

        /* =========================================
           6. 工具與輔助 
           ========================================= */
        function initViews() {
            const savedTab = localStorage.getItem('active_tab') || 'accounting';
            if (savedTab === 'itinerary') {
                const savedDay = localStorage.getItem('active_day') || 'day1';
                switchView('itinerary', savedDay);
                document.getElementById('day-selector').value = savedDay;
            } else { 
                switchView(savedTab); 
            }
        }

        function switchView(target, dayId = 'day1') {
            localStorage.setItem('active_tab', target);
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('day-selector').parentElement.classList.remove('active');

            if (target === 'accounting' || target === 'flight') {
                document.getElementById(`view-${target}`).classList.add('active');
                document.getElementById(`btn-${target}`).classList.add('active');
                document.getElementById('day-selector').value = "";
            } else if (target === 'itinerary') {
                document.getElementById('view-itinerary').classList.add('active');
                document.querySelectorAll('.day-schedule').forEach(el => el.classList.remove('active'));
                
                const dayEl = document.getElementById(`${dayId}-content`);
                if (dayEl) {
                    dayEl.classList.add('active');
                    window.scrollTo({ top: dayEl.offsetTop - 80, behavior: 'smooth' });
                }
                document.getElementById('day-selector').parentElement.classList.add('active');
                localStorage.setItem('active_day', dayId);
            }
        }

        function showToast(message, type = 'default') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = '<i class="ph ph-info"></i>'; if (type === 'success') icon = '<i class="ph ph-check-circle"></i>'; if (type === 'error') icon = '<i class="ph ph-warning-circle"></i>';
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast('已複製地址', 'success'));
            } else {
                const textArea = document.createElement("textarea"); textArea.value = text;
                document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); showToast('已複製地址', 'success'); } 
                catch (err) { showToast('複製失敗', 'error'); }
                document.body.removeChild(textArea);
            }
        }

        function forceAppUpdate() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).then(() => window.location.reload(true));
            } else { window.location.reload(true); }
        }
    </script>
