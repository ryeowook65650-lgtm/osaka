<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大阪旅遊</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FAF9F5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. 高級和洋折衷色彩變數與基礎 (Refined Variables)
           ========================================= */
        :root {
            /* 頂級質感調色盤 */
            --color-red: #9B2323;    /* 傳統漆器紅 */
            --color-red-light: #F4E8E8;
            --color-blue: #4A637D;   /* 琉璃紺 (深霧藍) */
            --color-gold: #C5A059;   /* 香檳金 */
            --color-cream: #FAF9F5;  /* 極淺米白，比原版更透亮 */
            
            /* 衍生 UI 用色 */
            --color-dark: #1C1917;   /* 幾近黑的深茶色 */
            --color-text-muted: #8A817C;
            --color-text-light: #B4ACA6;
            --color-white: #FFFFFF;
            
            /* 字體設定：強化襯線體的存在感 */
            --font-serif: "Noto Serif TC", "Georgia", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            
            /* 多層次平滑陰影 (Smooth Shadow) - 這是高級感的關鍵 */
            --shadow-sm: 0 2px 8px -2px rgba(28, 25, 23, 0.05), 0 1px 2px rgba(28, 25, 23, 0.02);
            --shadow-md: 0 12px 32px -4px rgba(28, 25, 23, 0.08), 0 4px 12px rgba(28, 25, 23, 0.03);
            --shadow-float: 0 20px 40px -8px rgba(155, 35, 35, 0.15), 0 8px 16px rgba(155, 35, 35, 0.08);
            
            --border-delicate: 1px solid rgba(28, 25, 23, 0.04);
            --border-inner: inset 0 0 0 1px rgba(255, 255, 255, 0.8); /* 擬真高光內邊框 */
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --radius-pill: 999px;
            
            /* 彈性阻尼動畫 */
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.15);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        button, input, select, textarea {
            appearance: none; -webkit-appearance: none;
            font-family: inherit; margin: 0; padding: 0; outline: none; background: transparent; border: none;
        }

        button, .chip, .nav-btn, .cat-btn, .date-divider, .weather-badge {
            touch-action: manipulation;
        }

        body { 
            margin: 0; padding: 0; font-family: var(--font-sans); background-color: var(--color-cream); color: var(--color-dark); letter-spacing: 0.03em; 
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            /* 極細緻的高級紙張紋理，取代粗糙的 noise */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.015'/%3E%3C/svg%3E");
            overscroll-behavior-y: none; 
            -webkit-user-select: none; user-select: none;
        }

        input, textarea { -webkit-user-select: auto; user-select: auto; }

        /* =========================================
           2. 頂部導覽列 (毛玻璃與懸浮設計)
           ========================================= */
        .top-bar { 
            position: sticky; top: 0; z-index: 999; 
            background: linear-gradient(180deg, rgba(250, 249, 245, 0.95) 0%, rgba(250, 249, 245, 0.7) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding-top: env(safe-area-inset-top); 
            border-bottom: 1px solid rgba(255,255,255,0.5); /* 高光下邊緣 */
        }
        .header-info { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .app-title { font-family: var(--font-serif); font-size: 24px; font-weight: 900; color: var(--color-dark); display: flex; align-items: center; gap: 8px; letter-spacing: 0.05em;}
        /* 標題小紅點裝飾 */
        .app-title::after { content:''; display:inline-block; width: 6px; height: 6px; background: var(--color-red); border-radius: 50%; margin-bottom: 12px; }

        .refresh-btn { font-size: 20px; cursor: pointer; color: var(--color-text-light); transition: 0.4s var(--ease-spring); }
        .refresh-btn:active { transform: rotate(180deg) scale(0.9); color: var(--color-dark); }

        .weather-badge { 
            font-size: 12px; font-weight: 700; color: var(--color-dark); background: rgba(255,255,255,0.6); 
            padding: 8px 14px; border-radius: var(--radius-pill); box-shadow: var(--border-inner), var(--shadow-sm); 
            border: var(--border-delicate); transition: 0.3s;
        }

        /* 類似 iOS 15 分頁控制項 */
        .nav-bar-row { display: flex; align-items: center; padding: 0 24px 16px; gap: 8px; }
        .nav-wrapper { display: flex; background: rgba(28,25,23,0.04); border-radius: var(--radius-pill); padding: 4px; width: 100%; box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); }
        .nav-btn, .nav-select-wrapper { flex: 1; position: relative;}
        .nav-btn, .nav-select { display: block; width: 100%; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 700; color: var(--color-text-muted); cursor: pointer; transition: 0.3s var(--ease-out); border-radius: var(--radius-pill); }
        .nav-select-wrapper::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--color-text-muted); pointer-events: none; }
        .nav-select { text-align-last: center; padding: 10px; }

        /* 啟動狀態的立體感浮動 */
        .nav-btn.active, .nav-select-wrapper.active .nav-select { 
            background-color: var(--color-white); color: var(--color-dark); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 1px rgba(0,0,0,0.04); 
        }

        /* =========================================
           3. 共用容器與進場動畫
           ========================================= */
        .view-container { display: none; padding: 20px 24px; max-width: 600px; margin: 0 auto; }
        .view-container.active { display: block; animation: smoothEnter 0.7s var(--ease-out) forwards; }
        @keyframes smoothEnter { 
            from { opacity: 0; transform: translateY(15px) scale(0.99); filter: blur(4px); } 
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
        }

        .retro-card, .flight-ticket, .input-area, .trip-card { 
            background-color: var(--color-white); border-radius: var(--radius-md); 
            box-shadow: var(--shadow-md); margin-bottom: 24px; border: var(--border-delicate);
            box-shadow: var(--border-inner), var(--shadow-md); /* 增加高級高光邊緣 */
        }

        /* =========================================
           4. 記帳版面 - 頂級信用卡質感
           ========================================= */
        .balance-card { 
            padding: 35px 30px; position: relative; overflow: hidden; 
            background: linear-gradient(135deg, #ffffff 0%, #F9F8F6 100%);
        }
        /* 卡片右上角的波紋幾何 */
        .balance-card::before { 
            content: ''; position: absolute; top: -60px; right: -40px; width: 180px; height: 180px; 
            background: radial-gradient(circle, var(--color-red-light) 0%, transparent 70%); opacity: 0.8; 
        }
        .balance-card::after {
            content: ''; position: absolute; bottom: -40px; left: -40px; width: 140px; height: 140px; 
            background: radial-gradient(circle, rgba(74, 99, 125, 0.08) 0%, transparent 70%);
        }

        .balance-label { font-size: 11px; font-weight: 800; color: var(--color-text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px;}
        .rate-tag { position: absolute; top: 25px; right: 25px; font-size: 11px; font-family: var(--font-sans); color: var(--color-text-muted); background: rgba(255,255,255,0.8); padding: 4px 10px; border-radius: var(--radius-pill); border: 1px solid rgba(0,0,0,0.03); backdrop-filter: blur(4px);}

        /* 漸層金屬字體效果 */
        .balance-amount { 
            font-family: var(--font-serif); font-variant-numeric: tabular-nums; 
            font-size: 48px; margin: 0 0 4px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; 
            background: linear-gradient(135deg, var(--color-dark) 20%, #554D48 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .balance-sub { font-size: 15px; font-weight: 700; color: var(--color-blue); font-family: var(--font-sans);}

        /* 預算進度條優化：膠囊式設計 */
        .budget-container { margin-top: 35px; padding-top: 25px; border-top: 1px solid rgba(28,25,23,0.06); display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 2;}
        .budget-tot-row { text-align: right; font-size: 11px; font-weight: 700; color: var(--color-text-light); }
        .budget-track { height: 8px; width: 100%; background: rgba(28,25,23,0.04); border-radius: var(--radius-pill); overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);}
        .budget-fill { 
            height: 100%; width: 0%; border-radius: var(--radius-pill);
            background: linear-gradient(90deg, #81A18B 0%, #AACCB1 100%); 
            transition: width 1s var(--ease-spring); 
        }
        .budget-rem-row { text-align: left; font-size: 18px; font-weight: 900; color: var(--color-dark); font-family: var(--font-serif); }

        /* 網格統計：微雕刻質感 Widget */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; position: relative; z-index: 2;}
        .stat-box { 
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border-radius: 16px; padding: 16px; 
            display: flex; flex-direction: column; gap: 6px; cursor: pointer; 
            transition: 0.3s var(--ease-spring); border: var(--border-delicate); box-shadow: var(--shadow-sm);
        }
        .stat-box:active { transform: scale(0.94); }
        .stat-box.active-filter { background: var(--color-dark); box-shadow: var(--shadow-md); border-color: var(--color-dark);}
        .stat-box-title { font-size: 12px; font-weight: 800; color: var(--color-text-muted); display: flex; align-items: center; gap: 6px; }
        .stat-box.active-filter .stat-box-title { color: rgba(255,255,255,0.7); }
        .stat-box-val { font-size: 18px; font-weight: 900; color: var(--color-dark); font-family: var(--font-serif); }
        .stat-box.active-filter .stat-box-val { color: var(--color-white); }

        /* =========================================
           5. 輸入區與橫向捲動 (Refined Inputs)
           ========================================= */
        .input-area { padding: 30px 24px; background: transparent; box-shadow: none; border: none;}
        .input-title { font-size: 14px; font-weight: 800; color: var(--color-text-muted); margin-bottom: 12px; display: block; font-family: var(--font-sans); letter-spacing: 0.05em;}

        .scroll-container, .cat-row { 
            overflow-x: auto; white-space: nowrap; padding-bottom: 15px; scrollbar-width: none; display: flex; gap: 10px; 
            padding-right: 40px; mask-image: linear-gradient(to right, black 85%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%); margin-bottom: 20px;
            scroll-snap-type: x mandatory; scroll-padding-left: 0;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .chip { 
            background: var(--color-white); border: 1px solid transparent; border-radius: var(--radius-pill); 
            padding: 10px 20px; font-size: 14px; font-weight: 700; color: var(--color-text-muted); 
            transition: 0.3s var(--ease-spring); box-shadow: var(--shadow-sm); scroll-snap-align: start;
        }
        .chip.active { background: var(--color-dark); color: var(--color-white); box-shadow: 0 4px 12px rgba(28,25,23,0.2); transform: translateY(-2px);}

        .cat-btn { 
            flex: 1; min-width: 80px; padding: 14px 10px; background: var(--color-white); border-radius: var(--radius-md); 
            border: 1px solid transparent; font-size: 12px; font-weight: 800; color: var(--color-text-muted); 
            transition: 0.3s var(--ease-spring); box-shadow: var(--shadow-sm); scroll-snap-align: start;
        }
        .cat-emoji { font-size: 26px; display: block; margin-bottom: 8px; transition: 0.3s var(--ease-spring); filter: grayscale(0.8) opacity(0.7);}
        .cat-btn.active { background: var(--color-white); color: var(--color-blue); border: 2px solid var(--color-blue); box-shadow: 0 6px 16px rgba(74, 99, 125, 0.15); transform: translateY(-4px);}
        .cat-btn.active .cat-emoji { filter: grayscale(0) opacity(1); transform: scale(1.15);}

        /* 輸入框設計：極簡分隔線風格 */
        .input-group { display: flex; flex-direction: column; background: var(--color-white); border-radius: var(--radius-md); margin-bottom: 24px; box-shadow: var(--shadow-sm), var(--border-inner); border: var(--border-delicate); overflow: hidden; transition: 0.3s; }
        .input-group:focus-within { box-shadow: 0 0 0 2px var(--color-gold), var(--shadow-md); }
        .curr-btn-row { display: flex; width: 100%; border-top: 1px solid rgba(0,0,0,0.04); border-bottom: 1px solid rgba(0,0,0,0.04); background: #FCFBFA; }
        .curr-btn { flex: 1; padding: 14px 0; font-size: 13px; font-weight: 800; color: var(--color-text-light); transition: 0.2s; border-right: 1px solid rgba(0,0,0,0.04); }
        .curr-btn:last-child { border-right: none; }
        .curr-btn.active { color: var(--color-gold); background: #FFF; box-shadow: inset 0 -2px 0 var(--color-gold);}

        .modern-input { display: block; width: 100%; padding: 20px; font-size: 16px; color: var(--color-dark); font-weight: 700; transition: 0.3s; }
        .modern-input::placeholder { color: var(--color-text-light); font-weight: 600; }

        /* 懸浮按鈕：頂級絲滑光影 */
        .add-btn { 
            width: 100%; background: linear-gradient(135deg, var(--color-red) 0%, #7A1919 100%); 
            color: var(--color-white); padding: 20px; border-radius: var(--radius-pill); font-size: 16px; font-weight: 800; 
            transition: 0.4s var(--ease-spring); letter-spacing: 0.1em; 
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), var(--shadow-float); 
            display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; 
            position: sticky; bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 100;
        }
        .add-btn:active { transform: scale(0.94) translateY(4px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 4px 8px rgba(155, 35, 35, 0.2); }

        /* =========================================
           6. 歷史清單 (Timeline 質感)
           ========================================= */
        .date-section { margin-bottom: 35px; }
        .date-divider { 
            font-family: var(--font-serif); font-size: 18px; color: var(--color-dark); font-weight: 900; 
            padding: 0 0 12px; border-bottom: 1px solid rgba(28,25,23,0.08); margin-bottom: 16px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; 
        }
        .date-divider::after { content: '▾'; font-family: var(--font-sans); font-size: 16px; color: var(--color-text-light); transition: 0.3s; }
        .date-section.collapsed .date-divider::after { transform: rotate(-90deg); }
        .date-section.collapsed .history-items-wrapper { display: none; }

        .history-item { 
            display: flex; justify-content: space-between; align-items: center; background: var(--color-white); 
            padding: 18px; margin-bottom: 10px; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); 
            transition: 0.3s var(--ease-spring); border: var(--border-delicate);
        }
        .history-item:active { transform: scale(0.97); background: #FCFBFA; }
        .h-name { font-weight: 800; font-size: 15px; color: var(--color-dark); display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .h-tag { font-size: 10px; background: rgba(197, 160, 89, 0.15); color: #9A7B3E; padding: 4px 8px; border-radius: 4px; font-weight: 800; letter-spacing: 0.05em;}
        .h-cat { font-size: 12px; color: var(--color-text-muted); font-weight: 700; margin-top: 6px;}
        .h-price { font-weight: 900; font-size: 17px; color: var(--color-red); font-family: var(--font-serif); font-variant-numeric: tabular-nums; text-align: right; }
        .h-twd { font-size: 11px; color: var(--color-text-light); display: block; font-weight: 700; margin-top: 4px; text-align: right; }
        .del-btn { color: var(--color-text-light); font-size: 20px; padding: 10px; margin-left: 10px; transition: 0.2s; border-radius: 50%;}
        .del-btn:active { color: var(--color-red); background: var(--color-red-light); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-light); border: 1px dashed rgba(28,25,23,0.15); border-radius: var(--radius-md); margin: 20px 0; }
        .empty-state-icon { font-size: 48px; margin-bottom: 15px; color: var(--color-text-light); filter: grayscale(1); opacity: 0.3;}

        /* =========================================
           7. 行程與機票設計 (Editorial Layout)
           ========================================= */
        .day-header { 
            font-family: var(--font-serif); font-size: 32px; color: var(--color-dark); margin-bottom: 40px; 
            font-weight: 900; letter-spacing: -0.02em; padding: 0 10px;
        }
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 20px; bottom: 20px; width: 1px; background: linear-gradient(180deg, rgba(28,25,23,0.1) 0%, transparent 100%);}
        .trip-card { 
            position: relative; overflow: hidden; padding-bottom: 10px; margin-bottom: 40px; 
            border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
        }
        .trip-card::after { 
            content: ''; position: absolute; left: -25px; top: 40px; width: 10px; height: 10px; 
            background: var(--color-gold); border: 2px solid var(--color-cream); z-index: 1; border-radius: 50%; box-shadow: 0 0 0 6px var(--color-cream);
        }
        .card-img-top { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
        .card-content { padding: 30px 25px; }
        .t-time { font-size: 11px; font-weight: 800; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: block;}
        .t-title { font-family: var(--font-serif); font-size: 24px; font-weight: 900; margin-bottom: 24px; line-height: 1.3; color: var(--color-dark); }
        .t-subtitle { font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--color-text-light); margin-top: 4px; display: block;}
        .info-block { display: flex; gap: 14px; margin-bottom: 18px; font-size: 15px; align-items: flex-start; }
        .i-icon { color: var(--color-text-muted); font-size: 22px; line-height: 1.2; }
        .i-text { flex: 1; line-height: 1.6; font-weight: 600; color: var(--color-dark); }
        .cost-tag { display: inline-block; color: var(--color-blue); font-size: 13px; font-weight: 700; margin-top: 4px; }
        
        .map-link { display: flex; align-items: center; justify-content: center; background: #faf9f5; color: var(--color-dark); text-decoration: none; padding: 18px; margin-top: 25px; font-size: 15px; font-weight: 700; gap: 8px; transition: var(--transition-speed); border-radius: 16px; border: 1px solid rgba(42,34,30,0.05);}
        .map-link:active { background: var(--color-cream); transform: scale(0.98); }
        .copy-btn { background: var(--color-white); border: 1px solid rgba(42,34,30,0.1); cursor: pointer; font-size: 13px; margin-left: 8px; color: var(--color-dark); padding: 4px 10px; border-radius: var(--radius-pill); display: inline-flex; align-items: center; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .copy-btn:active { background: var(--color-cream); }

        .flight-ticket { 
            border-radius: var(--radius-lg); overflow: hidden; position: relative;
            background: linear-gradient(180deg, #FFF 0%, #FDFBF7 100%);
        }
        .ticket-header { padding: 24px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(0,0,0,0.1); }
        .ticket-header.outbound { background: rgba(162,185,213,0.15); } 
        .ticket-header.inbound { background: rgba(170,204,177,0.15); }  
        .ticket-label { font-family: var(--font-sans); font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-dark);}
        .ticket-date { font-weight: 700; font-size: 14px; color: var(--color-text-muted);}
        .ticket-body { padding: 40px 30px 30px; }
        .route-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .airport-code { font-size: 48px; font-weight: 900; color: var(--color-dark); font-family: var(--font-serif); letter-spacing: -0.05em;}
        .airport-name { font-size: 14px; font-weight: 700; display: block; margin-top: 8px; color: var(--color-text-muted); }
        .flight-icon { font-size: 32px; color: var(--color-blue); opacity: 0.8; }
        .time-row { display: flex; justify-content: space-between; background: #faf9f5; padding: 20px; border-radius: 16px; margin-bottom: 20px;}
        .time-val { font-size: 22px; font-weight: 900; color: var(--color-red); font-family: var(--font-sans); }
        .time-lbl { font-size: 11px; font-weight: 700; margin-bottom: 8px; display: block; color: var(--color-text-muted); letter-spacing: 1px;}
        .flight-info-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--color-dark); padding: 0 5px;}

        /* =========================================
           8. Toast & Loading (極簡與高斯模糊)
           ========================================= */
        .toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 9999; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(28,25,23,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); color: var(--color-white); padding: 16px 20px; font-size: 14px; font-weight: 700; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast.hide { animation: toastOut 0.3s ease-in forwards; }
        .toast.success i { color: var(--color-green); font-size: 22px;}
        .toast.error i { color: var(--color-red-light); font-size: 22px;}
        .toast.warning i { color: var(--color-gold); font-size: 22px;}
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(10px) scale(0.95); } }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(250, 249, 245, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(155, 35, 35, 0.15); border-top-color: var(--color-red); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loading-text { font-family: var(--font-serif); font-size: 18px; font-weight: 900; color: var(--color-dark); letter-spacing: 2px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

            show ? overlay.classList.add('active') : overlay.classList.remove('active');
        }

        async function fetchExchangeRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                const data = await res.json();
                if (data?.rates?.TWD) {
                    Store.updateRate(data.rates.TWD);
                }
            } catch (e) { console.warn('匯率更新失敗，使用快取。'); }
            document.getElementById('rate-display').innerText = `匯率: ${Store.state.rate.toFixed(4)}`;
            renderExpenses();
        }

        async function fetchOsakaWeather() {
            const badge = document.getElementById('weather-badge');
            badge.disabled = true; badge.innerHTML = '🇯🇵 更新中...';
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.6937&longitude=135.5023&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await res.json();
                badge.innerHTML = `🇯🇵 大阪 ${Math.round(data.current_weather.temperature)}°C`;
            } catch (e) { 
                badge.innerHTML = '🇯🇵 天氣載入失敗'; 
            } finally {
                badge.disabled = false;
            }
        }

        async function fetchExpenses() {
            const listEl = document.getElementById('expense-list');
            
            if (Store.state.expenses.length > 0) {
                renderExpenses();
            } else {
                toggleLoading(true, '同步帳本資料...');
            }

            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const freshData = await res.json(); 
                Store.updateExpenses(freshData);
                renderExpenses();
            } catch (err) {
                if (Store.state.expenses.length === 0) {
                    listEl.innerHTML = `<div class="empty-state"><i class="ph ph-wifi-x empty-state-icon"></i><div class="empty-state-text">連線失敗，請檢查網路狀態</div></div>`;
                }
            } finally {
                toggleLoading(false);
            }
        }

        async function addExpense() {
            if (!SCRIPT_URL.startsWith('http')) return showToast('請先設定 Google Apps Script 網址', 'error');

            const itemNameEl = document.getElementById('item-name');
            const itemPriceEl = document.getElementById('item-price');

            const inputPrice = parseFloat(itemPriceEl.value); 
            
            if (isNaN(inputPrice) || inputPrice <= 0) {
                itemPriceEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => itemPriceEl.focus(), 300);
                return showToast('請先輸入有效的金額！', 'error'); 
            }
            
            let baseName = itemNameEl.value.trim() || Store.state.category;
            let personName = Store.state.person;
            let finalName = personName ? `【${personName}】${baseName}` : baseName;
            const finalPriceTWD = Store.state.currency === 'JPY' ? Math.round(inputPrice * Store.state.rate) : Math.round(inputPrice); 
            
            const newId = Date.now();
            const formData = newSearchParams({
                action: 'add', id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: finalPriceTWD
            });

            // Optimistic UI
            const newExpenseObj = {
                id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: finalPriceTWD
            };
            Store.updateExpenses([...Store.state.expenses, newExpenseObj]);
            renderExpenses();
            
            itemNameEl.value = ''; itemPriceEl.value = ''; itemPriceEl.blur(); 
            showToast(`已新增一筆花費！`, 'success');

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                fetchExpenses(); 
            } catch (err) { 
                showToast('背景同步延遲，資料已暫存', 'warning'); 
            }
        }

        async function deleteExpense(id) {
            if (!confirm('確定刪除此筆紀錄？')) return;
            const formData = new URLSearchParams({ action: 'delete', id });
            
            const originalExpenses = [...Store.state.expenses]; 
            Store.updateExpenses(Store.state.expenses.filter(item => item.id != id));
            renderExpenses(); 

            try { 
                await fetch(SCRIPT_URL, { method: 'POST', body: formData }); 
                showToast('紀錄已刪除', 'success');
                fetchExpenses();
            } catch (err) { 
                showToast('刪除失敗，資料已還原', 'error');
                Store.updateExpenses(originalExpenses);
                renderExpenses(); 
            }
        }

        const escapeHTML = str => String(str).replace(/[&<>'"]/g, tag => ({ 
            '&': '&', '<': '<', '>': '>', "'": ''', '"': '"' 
        }[tag] || tag));

        function newSearchParams(obj) {
            const params = new URLSearchParams();
            for (const key in obj) { params.append(key, obj[key]); }
            return params;
        }

        function renderExpenses() {
            let grandTotalTWD = 0; 
            let statsTWD = { '交通': 0, '食物': 0, '購物': 0, '其他': 0 };
            const fragment = document.createDocumentFragment();
            let hasRenderedAny = false;

            TRIP_DATES.forEach((date, index) => {
                const dailyItems = Store.state.expenses.filter(item => {
                    const sheetDate = String(item.date).trim();
                    let isMatchDate = (sheetDate === date || sheetDate.includes(date) || (sheetDate.includes('T') && `${new Date(sheetDate).getMonth() + 1}/${new Date(sheetDate).getDate()}` === date));
                    let isMatchFilter = (Store.state.activeFilter === 'All' || item.cat === Store.state.activeFilter);
                    return isMatchDate && isMatchFilter;
                });

                if (dailyItems.length > 0) {
                    hasRenderedAny = true;
                    const section = document.createElement('div');
                    section.className = 'date-section';
                    if (Store.state.activeFilter === 'All' && index < TRIP_DATES.indexOf(Store.state.date) - 1 ) {
                        section.classList.add('collapsed'); 
                    }

                    const divider = document.createElement('div'); 
                    divider.className = 'date-divider'; divider.textContent = date; 
                    divider.onclick = () => section.classList.toggle('collapsed');
                    section.appendChild(divider);

                    const wrapper = document.createElement('div');
                    wrapper.className = 'history-items-wrapper';

                    dailyItems.forEach(item => {
                        const twdValue = Math.round(parseFloat(item.price));
                        if (Store.state.activeFilter === 'All') {
                            grandTotalTWD += twdValue;
                            statsTWD[item.cat] = (statsTWD[item.cat] || 0) + twdValue;
                        }

                        const jpyValue = (twdValue / Store.state.rate).toFixed(0);
                        let safeName = escapeHTML(item.name); 
                        const emoji = EMOJI_MAP[item.cat] || EMOJI_MAP['其他'];

                        let personTagHtml = '';
                        const tagMatch = safeName.match(/^【(.*?)】(.*)/);
                        if (tagMatch) {
                            personTagHtml = `<span class="h-tag">${tagMatch[1]}</span>`;
                            safeName = tagMatch[2].trim();
                        }

                        const div = document.createElement('div'); 
                        div.className = 'history-item';
                        div.innerHTML = `
                            <div>
                                <div class="h-name">${emoji} <span>${safeName}</span> ${personTagHtml}</div>
                                <div class="h-cat">${item.cat}</div>
                            </div>
                            <div style="display:flex; align-items:center;">
                                <div>
                                    <div class="h-price">NT$ ${twdValue.toLocaleString()}</div>
                                    <span class="h-twd">≈ ¥ ${jpyValue}</span>
                                </div>
                                <button class="del-btn" onclick="deleteExpense(${item.id})"><i class="ph ph-trash"></i></button>
                            </div>`;
                        wrapper.appendChild(div);
                    });
                    section.appendChild(wrapper);
                    fragment.appendChild(section);
                }
            });

            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';
            if (!hasRenderedAny) {
                let emptyMsg = Store.state.activeFilter === 'All' ? '目前沒有記帳資料' : `這天沒有 ${Store.state.activeFilter} 的花費`;
                listEl.innerHTML = `<div class="empty-state"><i class="ph ph-receipt empty-state-icon"></i><div class="empty-state-text">${emptyMsg}</div></div>`;
            } else {
                listEl.appendChild(fragment);
            }

            if (Store.state.activeFilter === 'All') updateStats(grandTotalTWD, statsTWD);
        }

        function updateStats(totalTWD, statsTWD) {
            const displayTotalJPY = (totalTWD / Store.state.rate).toFixed(0);
            let remaining = TOTAL_BUDGET - totalTWD;
            let spentPercent = Math.min(100, Math.max(0, (totalTWD / TOTAL_BUDGET) * 100));
            
            document.getElementById('total-primary').textContent = `NT$ ${totalTWD.toLocaleString()}`;
            document.getElementById('total-secondary').textContent = `≈ ¥ ${displayTotalJPY}`;
            
            const remRow = document.getElementById('budget-rem-row');
            const fill = document.getElementById('budget-fill');
            remRow.textContent = remaining < 0 ? `超支 NT$ ${Math.abs(remaining).toLocaleString()}` : `剩餘 NT$ ${remaining.toLocaleString()}`;
            remRow.style.color = remaining < 0 ? 'var(--color-danger)' : (spentPercent > 85 ? 'var(--color-red)' : 'var(--color-dark)');
            fill.style.backgroundColor = remaining < 0 ? 'var(--color-danger)' : (spentPercent > 85 ? 'var(--color-gold)' : '#81A18B');
            fill.style.width = `${spentPercent}%`;

            document.getElementById('stat-transport').textContent = `NT$ ${(statsTWD['交通'] || 0).toLocaleString()}`;
            document.getElementById('stat-food').textContent = `NT$ ${(statsTWD['食物'] || 0).toLocaleString()}`;
            document.getElementById('stat-shopping').textContent = `NT$ ${(statsTWD['購物'] || 0).toLocaleString()}`;
            document.getElementById('stat-other').textContent = `NT$ ${(statsTWD['其他'] || 0).toLocaleString()}`;
        }

        /* =========================================
           7. 工具與輔助 
           ========================================= */
        function initViews() {
            const savedTab = localStorage.getItem('active_tab') || 'accounting';
            if (savedTab === 'itinerary') {
                const savedDay = localStorage.getItem('active_day') || 'day1';
                switchView('itinerary', savedDay);
                document.getElementById('day-selector').value = savedDay;
            } else { 
                switchView(savedTab); 
            }
        }

        function switchView(target, dayId = 'day1') {
            localStorage.setItem('active_tab', target);
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('day-selector').parentElement.classList.remove('active');

            if (target === 'accounting' || target === 'flight') {
                document.getElementById(`view-${target}`).classList.add('active');
                document.getElementById(`btn-${target}`).classList.add('active');
                document.getElementById('day-selector').value = "";
            } else if (target === 'itinerary') {
                document.getElementById('view-itinerary').classList.add('active');
                document.querySelectorAll('.day-schedule').forEach(el => el.classList.remove('active'));
                
                const dayEl = document.getElementById(`${dayId}-content`);
                if (dayEl) {
                    dayEl.classList.add('active');
                    window.scrollTo({ top: dayEl.offsetTop - 80, behavior: 'smooth' });
                }
                document.getElementById('day-selector').parentElement.classList.add('active');
                localStorage.setItem('active_day', dayId);
            }
        }

        function showToast(message, type = 'default') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = '<i class="ph ph-info"></i>'; if (type === 'success') icon = '<i class="ph ph-check-circle"></i>'; if (type === 'error') icon = '<i class="ph ph-warning-circle"></i>';
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast('已複製地址', 'success'));
            } else {
                const textArea = document.createElement("textarea"); textArea.value = text;
                document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); showToast('已複製地址', 'success'); } 
                catch (err) { showToast('複製失敗', 'error'); }
                document.body.removeChild(textArea);
            }
        }

        function forceAppUpdate() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).then(() => window.location.reload(true));
            } else { window.location.reload(true); }
        }
    </script>
